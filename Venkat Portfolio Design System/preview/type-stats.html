<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Stat Numerals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--bg-page); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 22px 0; }
  .stat { }
  .num { font-family: var(--font-serif); font-weight: 300; font-size: 64px; line-height: 1; color: var(--ink); letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
  .cap { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.14em; margin-top: 8px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="stat"><div class="num">5</div><div class="cap">Publications</div></div>
    <div class="stat"><div class="num">50+</div><div class="cap">Citations</div></div>
    <div class="stat"><div class="num">3.52</div><div class="cap">GPA</div></div>
    <div class="stat"><div class="num">6</div><div class="cap">Certifications</div></div>
  </div>
</body>
</html>
