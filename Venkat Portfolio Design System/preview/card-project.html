<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Project Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); font-family: var(--font-sans); }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 24px; box-shadow: 0 1px 2px rgba(15,15,18,0.04); }
  .eyebrow-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .tech { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); letter-spacing: 0.02em; }
  .status { font-size: 10px; color: var(--success); text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600; }
  .title { font-family: var(--font-serif); font-size: 22px; font-weight: 500; color: var(--ink); line-height: 1.2; margin-bottom: 10px; letter-spacing: -0.015em; }
  .desc { font-size: 14px; color: var(--ink-2); line-height: 1.6; margin-bottom: 14px; }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { font-size: 11px; padding: 3px 8px; border-radius: 4px; background: var(--surface-2); border: 1px solid var(--line); color: var(--ink-2); font-weight: 500; }
</style>
</head>
<body>
  <div class="card">
    <div class="eyebrow-row">
      <span class="tech">Python · RAG · Vector DB</span>
      <span class="status">● Active</span>
    </div>
    <div class="title">Multi-Agent AI Research Discovery Platform</div>
    <div class="desc">23-agent research automation system using Mixture of Experts architecture for literature discovery and analysis.</div>
    <div class="chips"><span class="chip">Python</span><span class="chip">RAG</span><span class="chip">MoE</span><span class="chip">Vector DB</span></div>
  </div>
</body>
</html>
