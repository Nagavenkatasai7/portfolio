<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Color — Primary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface); }
  .chip { height: 88px; }
  .label { padding: 10px 12px; }
  .name { font-size: 13px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#FAFAF7;border-bottom:1px solid var(--line)"></div><div class="label"><div class="name">Canvas</div><div class="hex">#FAFAF7</div></div></div>
    <div class="swatch"><div class="chip" style="background:#0F0F12"></div><div class="label"><div class="name">Ink</div><div class="hex">#0F0F12</div></div></div>
    <div class="swatch"><div class="chip" style="background:#B8633A"></div><div class="label"><div class="name">Accent</div><div class="hex">#B8633A</div></div></div>
    <div class="swatch"><div class="chip" style="background:#F5E8DF"></div><div class="label"><div class="name">Accent Tint</div><div class="hex">#F5E8DF</div></div></div>
  </div>
</body>
</html>
