<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Color — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-page); }
  .list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border: 1px solid var(--line); border-radius: var(--radius-lg); background: var(--surface); }
  .dot { width: 32px; height: 32px; border-radius: 6px; flex-shrink: 0; }
  .meta-col { flex: 1; min-width: 0; }
  .name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); }
  .use { font-size: 11px; color: var(--ink-4); margin-top: 2px; }
</style>
</head>
<body>
  <div class="list">
    <div class="item"><div class="dot" style="background:#5C7A52"></div><div class="meta-col"><div class="name">Success</div><div class="hex">#5C7A52</div><div class="use">Verified · certified</div></div></div>
    <div class="item"><div class="dot" style="background:#E8EEE2"></div><div class="meta-col"><div class="name">Success Tint</div><div class="hex">#E8EEE2</div><div class="use">Badge fills</div></div></div>
    <div class="item"><div class="dot" style="background:#B88A3A"></div><div class="meta-col"><div class="name">Warning</div><div class="hex">#B88A3A</div><div class="use">Pending states</div></div></div>
    <div class="item"><div class="dot" style="background:#A3432F"></div><div class="meta-col"><div class="name">Danger</div><div class="hex">#A3432F</div><div class="use">Errors, destructive</div></div></div>
  </div>
</body>
</html>
